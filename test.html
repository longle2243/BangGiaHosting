<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đang Bảo Trì Hệ Thống</title>

<style>
body {
    margin: 0;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    font-family: Arial, sans-serif;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    text-align: center;
}

/* Box chính */
.container {
    background: rgba(0,0,0,0.6);
    padding: 40px;
    border-radius: 16px;
    max-width: 500px;
    width: 90%;
    box-shadow: 0 0 30px rgba(0,0,0,0.5);
}

/* Icon */
.icon {
    font-size: 60px;
    margin-bottom: 20px;
}

/* Tiêu đề */
h1 {
    margin: 10px 0;
    font-size: 28px;
}

/* Nội dung */
p {
    color: #ccc;
    line-height: 1.6;
}

/* Nút */
button {
    margin-top: 20px;
    padding: 10px 20px;
    border: none;
    background: #00c6ff;
    color: white;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
}

button:hover {
    background: #0072ff;
}

/* loading */
.loader {
    margin-top: 20px;
}

.dot {
    height: 10px;
    width: 10px;
    margin: 0 3px;
    background-color: #00c6ff;
    border-radius: 50%;
    display: inline-block;
    animation: bounce 1.4s infinite;
}

.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce {
    0%, 80%, 100% { transform: scale(0); }
    40% { transform: scale(1); }
}
</style>

</head>
<body>

<div class="container">
    <div class="icon">🛠️</div>
    <h1>Website Đang Bảo Trì</h1>

    <p>
        Trang web hiện đang được nâng cấp để mang lại trải nghiệm tốt hơn cho bạn.<br>
        Vui lòng quay lại sau ít phút.
    </p>

    <p>
        Nếu cần hỗ trợ gấp, vui lòng liên hệ:<br>
        📞 Hotline: 0559 115 900<br>
        📩 Email: longle.nasani@gmail.com
    </p>

    <div class="loader">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
    </div>

    <button onclick="reloadPage()">Tải lại trang</button>
</div>

<script>
function reloadPage() {
    location.reload();
}
</script>

</body>
</html>
